version: "3.9"

# ── Port Intelligence Stack ───────────────────────────────────────────────────
# Services: API (FastAPI) + PostgreSQL + Redis + Streamlit dashboard
#
# Quick start:
#   make up          →  docker-compose up --build -d
#   make test        →  run smoke tests
#   make down        →  tear down

services:

  # ── PostgreSQL ──────────────────────────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    container_name: port_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB:       port_intelligence
      POSTGRES_USER:     portuser
      POSTGRES_PASSWORD: portpass
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/01_init.sql:ro
      - ./database/views.sql:/docker-entrypoint-initdb.d/02_views.sql:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U portuser -d port_intelligence"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis ───────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: port_redis
    restart: unless-stopped
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  # ── API (FastAPI) ────────────────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: final
    container_name: port_api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      REDIS_URL:    redis://redis:6379/0
      DATABASE_URL: postgresql://portuser:portpass@postgres:5432/port_intelligence
      LOG_LEVEL:    info
    ports:
      - "8000:8000"
    volumes:
      # Mount models directory so they can be updated without rebuild
      - ./models:/app/models:ro
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health')\""]
      interval: 30s
      timeout: 10s
      start_period: 20s
      retries: 3

  # ── Streamlit Dashboard ──────────────────────────────────────────────────────
  dashboard:
    image: python:3.11-slim
    container_name: port_dashboard
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    environment:
      API_BASE_URL: http://api:8000
    working_dir: /app
    volumes:
      - ./demo:/app/demo
      - ./data:/app/data:ro
    command: >
      bash -c "
        pip install --quiet streamlit pandas plotly requests pyarrow &&
        streamlit run demo/streamlit_app.py
          --server.port=8501
          --server.address=0.0.0.0
          --server.headless=true
          --browser.gatherUsageStats=false
      "
    ports:
      - "8501:8501"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8501/_stcore/health || exit 1"]
      interval: 30s
      timeout: 10s
      start_period: 60s
      retries: 3

volumes:
  pg_data:
    driver: local

networks:
  default:
    name: port_intelligence_net
